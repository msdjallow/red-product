<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED PRODUCT - Liste des hôtels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#F8F9FA] flex min-h-screen font-sans">

    <aside class="w-64 bg-[#494C4F] text-white flex flex-col justify-between sticky top-0 h-screen shadow-xl">
        <div>
            <div class="p-6 text-xl font-bold flex items-center gap-2 border-b border-gray-600/50 uppercase italic tracking-tighter">
                <i class="fa-solid fa-hotel text-white"></i> RED PRODUCT
            </div>
            <nav class="mt-4">
                <p class="px-6 py-2 text-[10px] uppercase text-gray-400 font-bold tracking-widest">Principal</p>
                <a href="index.html" class="flex items-center gap-4 px-6 py-3 hover:bg-white/10 transition italic">
                    <i class="fa-solid fa-chart-line text-gray-400"></i> Dashboard
                </a>
                <a href="hotels.html" class="flex items-center gap-4 px-6 py-3 bg-white text-black font-bold italic">
                    <i class="fa-solid fa-hotel"></i> Liste des hôtels
                </a>
            </nav>
        </div>
        
        <div class="p-6 border-t border-gray-600 flex items-center gap-3">
            <div class="relative">
                <img src="https://ui-avatars.com/api/?name=User" id="sidebarAvatar" class="w-10 h-10 rounded-full border-2 border-green-500">
                <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-[#494C4F] rounded-full"></span>
            </div>
            <div class="overflow-hidden">
                <p id="sidebarName" class="text-sm font-bold truncate">Chargement...</p>
                <p class="text-[10px] text-green-400 font-bold">● en ligne</p>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen">
        <header class="bg-white h-16 border-b px-8 flex items-center justify-between shrink-0">
            <h1 class="text-lg font-bold text-gray-700 uppercase">Liste des hôtels</h1>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <input type="text" placeholder="Recherche" class="pl-10 pr-4 py-1.5 bg-gray-50 border border-gray-200 rounded-full text-sm outline-none w-64 focus:ring-2 focus:ring-gray-100">
                    <i class="fa-solid fa-search absolute left-4 top-2.5 text-gray-400 text-xs"></i>
                </div>
                <div class="flex items-center gap-4 border-l pl-6">
                    <div class="relative cursor-pointer">
                        <i class="fa-regular fa-bell text-gray-600 text-xl"></i>
                        <span class="absolute -top-1.5 -right-1.5 bg-yellow-400 text-[9px] px-1 rounded-full text-white font-bold border border-white">3</span>
                    </div>
                    <img src="https://ui-avatars.com/api/?name=User" id="headerAvatar" class="w-8 h-8 rounded-full border shadow-sm">
                    <i class="fa-solid fa-right-from-bracket text-gray-500 hover:text-red-500 cursor-pointer text-lg" onclick="logout()"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8 bg-white p-4 rounded-xl border border-gray-100 shadow-sm">
                <h2 class="text-2xl font-normal">Hôtels <span id="hotelCount" class="text-gray-400 ml-2">0</span></h2>
                <button id="openModal" class="bg-white border border-gray-300 text-gray-700 px-5 py-2 rounded-xl text-sm font-semibold hover:bg-gray-50 flex items-center gap-2 shadow-sm transition-all active:scale-95">
                    <i class="fa-solid fa-plus text-[10px]"></i> Créer un nouveau hôtel
                </button>
            </div>

            <div id="hotelGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <div id="hotelModal" class="fixed inset-0 bg-black/50 backdrop-blur-[2px] hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden animate-in zoom-in duration-200">
            <div class="p-6 border-b border-dashed flex items-center gap-4 text-gray-600">
                <button id="closeModal" class="hover:text-black transition-colors"><i class="fa-solid fa-arrow-left"></i></button>
                <h3 class="uppercase font-bold text-sm tracking-widest">Créer un nouveau hôtel</h3>
            </div>
            
            <form id="hotelForm" class="p-8">
                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Nom de l'hôtel</label>
                        <input type="text" id="hName" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none" placeholder="Nom de l'hôtel">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Adresse</label>
                        <input type="text" id="hAddress" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none" placeholder="Adresse complète">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">E-mail</label>
                        <input type="email" id="hEmail" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none" placeholder="email@exemple.com">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Numéro de téléphone</label>
                        <input type="tel" id="hPhone" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none" placeholder="+221 ...">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Prix par nuit</label>
                        <input type="number" id="hPrice" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none" placeholder="25000">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Devise</label>
                        <select id="hCurrency" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:border-gray-400 outline-none bg-white">
                            <option value="XOF">F XOF</option>
                            <option value="EUR">Euro €</option>
                            <option value="USD">Dollar $</option>
                        </select>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="text-[11px] font-bold text-gray-500 uppercase mb-1 block">Ajouter une photo</label>
                    <div class="border-2 border-dashed border-gray-200 rounded-xl py-10 flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 transition cursor-pointer">
                        <i class="fa-regular fa-image text-4xl mb-2 opacity-30"></i>
                        <p class="text-sm">Cliquez pour ajouter</p>
                    </div>
                </div>

                <div class="flex justify-end mt-8">
                    <button type="submit" class="bg-[#494C4F] text-white px-10 py-2.5 rounded-lg font-bold text-sm hover:bg-black transition-all shadow-lg active:scale-95">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- GESTION DU PROFIL ---
        const savedUser = localStorage.getItem('currentUser') || "Mahamadou Abdoulaye Diallo";
        document.getElementById('sidebarName').innerText = savedUser;
        document.getElementById('sidebarAvatar').src = `https://ui-avatars.com/api/?name=${savedUser}&background=random`;
        document.getElementById('headerAvatar').src = `https://ui-avatars.com/api/?name=${savedUser}&background=random`;

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = "login.html";
        }

        // --- GESTION DES HÔTELS ---
        let hotels = [
            { name: "Hôtel Terrou-Bi", address: "Boulevard Martin Luther King Dakar", price: "25.000", currency: "XOF", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400" },
            { name: "King Fahd Palace", address: "Rte des Almadies, Dakar", price: "20.000", currency: "XOF", img: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=400" },
            { name: "Radisson Blu Hotel", address: "Rte de la Corniche O, Dakar", price: "22.000", currency: "XOF", img: "https://images.unsplash.com/photo-1571896349842-33c89424de2d?w=400" },
            { name: "Pullman Dakar Teranga", address: "Place de l'Independance, Dakar", price: "30.000", currency: "XOF", img: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?w=400" },
            { name: "Hôtel Lac Rose", address: "Lac Rose, Dakar", price: "25.000", currency: "XOF", img: "https://images.unsplash.com/photo-1445013541591-d1eea6072048?w=400" },
            { name: "Hôtel Saly", address: "Mbour, Sénégal", price: "20.000", currency: "XOF", img: "https://images.unsplash.com/photo-1512918728675-ed5a9ecdebfd?w=400" },
            { name: "Palm Beach Resort", address: "BP64, Saly 23000", price: "22.000", currency: "XOF", img: "https://images.unsplash.com/photo-1571003123894-1f0594d2b5d9?w=400" },
            { name: "Hôtel Ngor Diarama", address: "Ngor, Dakar", price: "18.000", currency: "XOF", img: "https://images.unsplash.com/photo-1496417263034-38ec4f0b665a?w=400" }
        ];

        const hotelGrid = document.getElementById('hotelGrid');
        const hotelCount = document.getElementById('hotelCount');

        function renderHotels() {
            hotelGrid.innerHTML = "";
            hotels.forEach(hotel => {
                hotelGrid.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all">
                        <img src="${hotel.img}" class="h-44 w-full object-cover">
                        <div class="p-4">
                            <p class="text-[10px] text-orange-600 font-bold uppercase mb-1">${hotel.address}</p>
                            <h3 class="text-lg font-bold text-gray-900">${hotel.name}</h3>
                            <p class="text-xs text-gray-500 mt-2">${hotel.price} ${hotel.currency} par nuit</p>
                        </div>
                    </div>
                `;
            });
            hotelCount.innerText = hotels.length;
        }

        // --- GESTION MODALE ---
        const modal = document.getElementById('hotelModal');
        document.getElementById('openModal').onclick = () => modal.classList.remove('hidden');
        document.getElementById('closeModal').onclick = () => modal.classList.add('hidden');

        document.getElementById('hotelForm').onsubmit = (e) => {
            e.preventDefault();
            const newHotel = {
                name: document.getElementById('hName').value,
                address: document.getElementById('hAddress').value,
                price: document.getElementById('hPrice').value,
                currency: document.getElementById('hCurrency').value,
                img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=400" 
            };
            hotels.push(newHotel);
            renderHotels();
            modal.classList.add('hidden');
            e.target.reset();
        };

        renderHotels();
    </script>
</body>
</html>
