<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED PRODUCT - Mot de passe oublié</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #494C4F; }</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-md">
        <div class="flex items-center justify-center gap-2 mb-8 text-white text-2xl font-bold uppercase"><i class="fa-solid fa-hotel"></i> RED PRODUCT</div>
        <div class="bg-white rounded-lg shadow-2xl p-10">
            <h2 class="text-gray-800 text-lg font-medium mb-4">Mot de passe oublié?</h2>
            <p class="text-gray-500 text-sm mb-10">Entrez votre adresse e-mail ci-dessous et nous vous envoyons des instructions sur la façon de modifier votre mot de passe.</p>
            <form action="login.html" class="space-y-10">
                <div class="border-b border-gray-200 focus-within:border-gray-500 transition-colors">
                    <label class="text-[11px] font-bold text-gray-400 uppercase block mb-1">Votre e-mail</label>
                    <input type="email" required class="w-full py-1 outline-none text-gray-700" placeholder="e-mail">
                </div>
                <button type="submit" class="w-full bg-[#494C4F] text-white py-3 rounded-md font-bold hover:bg-black transition shadow-lg">Envoyer</button>
            </form>
        </div>
        <div class="text-center mt-8">
            <a href="login.html" class="text-white text-sm font-medium">Revenir à la <span class="text-yellow-500 font-bold italic">connexion</span></a>
        </div>
    </div>
</body>
</html>
